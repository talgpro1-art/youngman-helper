name: Optimize image assets

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    name: Optimize header and icon assets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Pillow
        run: python -m pip install pillow

      - name: Resize and optimize PNG assets
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          def optimize_png(path: str, max_width: int, mode: str) -> None:
              target = Path(path)
              if not target.exists():
                  return
              image = Image.open(target)
              if image.width > max_width:
                  ratio = max_width / image.width
                  image = image.resize((max_width, round(image.height * ratio)), Image.Resampling.LANCZOS)
              image = image.convert(mode)
              image.save(target, format="PNG", optimize=True, compress_level=9)

          optimize_png("assets/header.png", 1600, "RGB")
          optimize_png("assets/icon.png", 512, "RGBA")
          PY

      - name: Commit optimized assets
        run: |
          if [ -n "$(git status --porcelain assets/header.png assets/icon.png)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/header.png assets/icon.png
            git commit -m "Optimize dashboard image assets"
            git push
          else
            echo "Assets already optimized."
          fi
