name: Refresh dashboard data

on:
  schedule:
    - cron: "10 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    name: Refresh notifications and price-link status
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh news notifications
        run: python scripts/update_notifications.py

      - name: Check official price links
        run: python scripts/check_price_links.py

      - name: Commit refreshed data
        run: |
          if [ -n "$(git status --porcelain data/notifications.json data/link_status.csv)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/notifications.json data/link_status.csv
            git commit -m "Refresh dashboard data"
            git push
          else
            echo "No dashboard data changes to commit."
          fi
